<!-- templates/demo.html -->
{% extends 'base.html' %}

{% block title %}Live Demo | Blood AI{% endblock %}

{% block content %}
<section id="demo" class="fade-in" style="max-width: 400px; margin: 3rem auto; padding: 0 1rem; text-align: center;">
  <h2 style="color: var(--secondary-color);">Live Demo</h2>
  <form id="upload-form" action="{{ url_for('predict') }}" method="post" enctype="multipart/form-data" style="margin-top: 1rem;">
    <label for="fingerprint-upload" class="cta-button" style="display: block; cursor: pointer; border-radius: 50px; padding: 1rem 0;">
      Choose Fingerprint Image
    </label>
    <input id="fingerprint-upload" name="fingerprint-image" type="file" accept="image/*" hidden required />
    <button type="submit" class="submit-button cta-button" style="width: 100%; margin-top: 1rem; border-radius: 50px;">
      Analyze
    </button>
  </form>
  <div id="result-display" style="margin-top: 1.5rem; min-height: 50px; font-style: italic; color: #666;">
    No file selected.
  </div>
  <img id="image-preview" alt="Selected fingerprint preview" style="max-width: 100%; margin-top: 1rem; border-radius: 10px; display: none;" />
</section>

<!-- Modal for showing results -->
<div id="result-modal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background-color:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:1000;">
  <div class="modal-content" style="background-color: var(--card-background); padding: 2rem; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); position:relative; max-width:500px; width:90%; text-align:center;">
    <button class="modal-close-btn" style="position:absolute; top:10px; right:10px; background:none; border:none; color:var(--secondary-color); font-size:1.5rem; cursor:pointer; line-height:1;">&times;</button>
    <div id="modal-content-container"></div>
    <div id="modal-download-link" style="margin-top:1.5rem;"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const fileInput = document.getElementById('fingerprint-upload');
  const imagePreview = document.getElementById('image-preview');
  const resultDisplay = document.getElementById('result-display');
  const modal = document.getElementById('result-modal');
  const modalContentContainer = document.getElementById('modal-content-container');
  const closeBtn = document.querySelector('.modal-close-btn');
  const uploadForm = document.getElementById('upload-form');
  let uploadedImageData = null;

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) {
      const file = fileInput.files[0];
      const reader = new FileReader();
      reader.onload = e => {
        uploadedImageData = e.target.result;
        imagePreview.src = uploadedImageData;
        imagePreview.style.display = 'block';
        resultDisplay.textContent = `File selected: ${file.name}`;
      };
      reader.readAsDataURL(file);
    } else {
      imagePreview.style.display = 'none';
      resultDisplay.textContent = 'No file selected.';
      uploadedImageData = null;
    }
  });

  uploadForm.addEventListener('submit', async e => {
    e.preventDefault();
    if (!fileInput.files[0]) {
      resultDisplay.textContent = 'Please select a file first.';
      return;
    }
    resultDisplay.textContent = 'Analyzing image, please wait...';

    const formData = new FormData(uploadForm);
    try {
      const response = await fetch(uploadForm.action, { method: 'POST', body: formData });
      const data = await response.json();

      if (response.ok) {
        modalContentContainer.innerHTML = `
          <h3>Predicted Blood Group: ${data.prediction}</h3>
          <p>A detailed report has been generated.</p>
          <img src="${uploadedImageData}" alt="Uploaded fingerprint" style="max-width:100%; border-radius:10px; margin-top:1rem;" />
        `;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(22);
        doc.text('Blood Group Report', 105, 20, { align: 'center' });
        doc.setFontSize(14);
        doc.text('Generated by Blood AI', 105, 30, { align: 'center' });
        doc.text(`Date: ${new Date().toLocaleDateString()}`, 20, 50);
        doc.text(`Time: ${new Date().toLocaleTimeString()}`, 20, 60);
        doc.text(`Fingerprint Image: ${fileInput.files[0].name}`, 20, 70);
        doc.addImage(uploadedImageData, 'JPEG', 20, 80, 80, 80);
        doc.setFontSize(18);
        doc.text(`Predicted Group: ${data.prediction}`, 20, 180);

        const downloadLink = document.createElement('a');
        downloadLink.href = '#';
        downloadLink.textContent = 'Download PDF Report';
        downloadLink.className = 'cta-button';
        downloadLink.style.display = 'inline-block';
        downloadLink.style.marginTop = '1rem';
        modalContentContainer.appendChild(downloadLink);

        downloadLink.addEventListener('click', e => {
          e.preventDefault();
          doc.save(`Blood_Group_Report_${Date.now()}.pdf`);
        });

        modal.style.display = 'flex';
      } else {
        resultDisplay.textContent = `Error: ${data.error}`;
      }
    } catch (error) {
      resultDisplay.textContent = `An error occurred: ${error.message}`;
      console.error(error);
    }
  });

  closeBtn.addEventListener('click', () => {
    modal.style.display = 'none';
  });

  window.addEventListener('click', e => {
    if (e.target === modal) {
      modal.style.display = 'none';
    }
  });
</script>
{% endblock %}
